# =============================================================================
# Object 2 of 3 — Credential (k0rdent CRD)
# Safe to commit — no sensitive data. Apply directly (no envsubst needed):
#     kubectl apply -f openstack-credential.yaml
# identityRef.name/namespace MUST match the Secret above.
# =============================================================================
apiVersion: k0rdent.mirantis.com/v1beta1
kind: Credential
metadata:
  name: openstack-cluster-identity-cred
  namespace: kcm-system
  labels:
    k0rdent.mirantis.com/component: "kcm"
spec:
  description: "OpenStack credentials for child clusters"
  identityRef:
    apiVersion: v1
    kind: Secret
    name: openstack-cloud-config
    namespace: kcm-system
