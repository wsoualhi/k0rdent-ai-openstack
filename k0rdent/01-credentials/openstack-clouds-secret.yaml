# =============================================================================
# Object 1 of 3 — Secret (clouds.yaml for the OpenStack provider / CAPO)
#
# SAFE TO COMMIT: contains only ${OS_*} variable references — NO real secrets.
# Real values are injected at apply time from the repo-root .env via envsubst. Render to the
# gitignored rendered/ folder first (it WILL hold the real password — never commit it), then apply:
#
#     set -a; source ../.env; set +a           # .env is gitignored (holds the real password)
#     mkdir -p rendered
#     envsubst < 01-credentials/openstack-clouds-secret.yaml > rendered/openstack-clouds-secret.yaml
#     kubectl apply -f rendered/openstack-clouds-secret.yaml
#
# Uses username/password auth from .env. To harden, switch to an application
# credential (auth_type: v3applicationcredential) — see the commented block below.
# Secret name must be exactly: openstack-cloud-config
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: openstack-cloud-config
  namespace: kcm-system
  labels:
    k0rdent.mirantis.com/component: "kcm"
stringData:
  clouds.yaml: |
    clouds:
      openstack:
        auth:
          auth_url: ${OS_AUTH_URL}
          username: "${OS_USERNAME}"
          password: "${OS_PASSWORD}"
          project_id: "${OS_PROJECT_ID}"
          project_name: "${OS_PROJECT_NAME}"
          user_domain_name: "${OS_USER_DOMAIN_NAME}"
          project_domain_id: "${OS_PROJECT_DOMAIN_ID}"
        region_name: ${OS_REGION_NAME}
        interface: ${OS_INTERFACE}
        identity_api_version: 3
  # --- Optional hardening: application credential instead of username/password ---
  # Replace the `auth:` block above with:
  #   auth:
  #     auth_url: ${OS_AUTH_URL}
  #     application_credential_id: ${OS_APPLICATION_CREDENTIAL_ID}
  #     application_credential_secret: ${OS_APPLICATION_CREDENTIAL_SECRET}
  #   auth_type: v3applicationcredential
  #
  # --- Optional: CA bundle if OpenStack endpoints use a private/self-signed CA ---
  # cacert: |
  #   -----BEGIN CERTIFICATE-----
  #   ...
  #   -----END CERTIFICATE-----
